name: Deploy Investment Wiki

on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [content-updated]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout build config (wiki-build)
        uses: actions/checkout@v4

      - name: Checkout content (investment-wiki) into ./content
        uses: actions/checkout@v4
        with:
          repository: chen101703/investment-wiki
          token: ${{ secrets.CONTENT_REPO_TOKEN }}
          path: content
          fetch-depth: 0
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Build Quartz
        run: npx quartz build -d content

      - name: Encrypt site with StatiCrypt
        env:
          STATICRYPT_PASSWORD: ${{ secrets.WIKI_PASSWORD }}
        run: |
          npm install -g staticrypt
          encrypt_file() {
            f="$1"
            dir=$(dirname "$f")
            staticrypt "$f" -d "$dir" --short --remember 30 \
              --template-title "Investment Wiki" \
              --template-instructions "Enter the wiki password to continue." \
              --template-color-primary "#1a56db" \
              --template-color-secondary "#f5f5f5"
          }
          export -f encrypt_file
          export STATICRYPT_PASSWORD
          find public -name "*.html" -type f | xargs -P 8 -I {} bash -c 'encrypt_file "{}"'

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=investment-wiki
